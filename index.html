<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mohammed Suhail</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      overflow-x: hidden;
    }

    /* Animated gradient background blobs */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      animation: drift 10s ease-in-out infinite alternate;
    }
    .blob-1 {
      width: 480px; height: 480px;
      background: radial-gradient(circle, #ff6fd8, #ff3cac);
      top: -120px; left: -100px;
      animation-delay: 0s;
    }
    .blob-2 {
      width: 420px; height: 420px;
      background: radial-gradient(circle, #3b82f6, #7c3aed);
      bottom: -100px; right: -80px;
      animation-delay: -4s;
    }
    .blob-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #06b6d4, #10b981);
      top: 40%; left: 55%;
      animation-delay: -7s;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.08); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 28px;
      padding: 44px 32px 40px;
      text-align: center;
      box-shadow: 0 8px 64px rgba(0,0,0,0.45);
    }

    /* Avatar */
    .avatar-wrap {
      width: 90px;
      height: 90px;
      margin: 0 auto 20px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, #ff3cac, #784ba0, #2b86c5, #06b6d4);
      animation: spin-gradient 4s linear infinite;
    }
    @keyframes spin-gradient {
      0%   { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }
    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -1px;
    }

    /* Name */
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }
    .handle {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      margin-top: 6px;
      letter-spacing: 0.5px;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 3px;
      border-radius: 99px;
      background: linear-gradient(90deg, #ff3cac, #2b86c5);
      margin: 18px auto;
    }

    /* Links */
    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 4px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 16px 20px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.1px;
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
      cursor: pointer;
    }
    .link-btn:hover {
      transform: translateY(-2px) scale(1.01);
      background: rgba(255,255,255,0.12);
      box-shadow: 0 6px 32px rgba(0,0,0,0.3);
    }
    .link-btn:active {
      transform: scale(0.98);
    }

    .icon-wrap {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .icon-wrap.linkedin { background: #0077b5; }
    .icon-wrap.email    { background: linear-gradient(135deg, #ff3cac, #784ba0); }

    .link-label {
      flex: 1;
      text-align: left;
    }
    .link-sublabel {
      display: block;
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      margin-top: 2px;
    }
    .arrow {
      opacity: 0.4;
      font-size: 16px;
    }

    /* Footer */
    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: rgba(255,255,255,0.25);
    }
    .footer span {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff3cac, #2b86c5);
      vertical-align: middle;
      margin: 0 5px;
    }
  </style>
</head>
<body>

  <div class="bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="card">

    <div class="avatar-wrap">
      <div class="avatar-inner">MS</div>
    </div>

    <h1>Mohammed Suhail</h1>
    <p class="handle">@MS1024Blnktree</p>

    <div class="divider"></div>

    <div class="links">

      <!-- LinkedIn -->
      <a class="link-btn" href="https://www.linkedin.com/in/YOUR-LINKEDIN-ID" target="_blank" rel="noopener">
        <div class="icon-wrap linkedin">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
            <path d="M20.45 20.45h-3.554v-5.57c0-1.328-.024-3.037-1.85-3.037-1.853 0-2.136 1.446-2.136 2.94v5.667H9.356V9h3.414v1.561h.047c.476-.9 1.637-1.85 3.368-1.85 3.6 0 4.267 2.37 4.267 5.455v6.284zM5.337 7.433a2.062 2.062 0 1 1 0-4.124 2.062 2.062 0 0 1 0 4.124zm1.777 13.017H3.56V9h3.554v11.45zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.226.792 24 1.771 24h20.451C23.2 24 24 23.226 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
          </svg>
        </div>
        <div class="link-label">
          LinkedIn
          <span class="link-sublabel">Connect with me professionally</span>
        </div>
        <span class="arrow">›</span>
      </a>

    </div>

    <div class="footer">
      Mohammed Suhail <span></span> Links
    </div>

  </div>

</body>
</html>
